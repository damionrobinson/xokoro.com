<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — Xokoro</title>
</head>
<body>
  <!--
    This site is hosted on GitHub Pages, not Netlify. We deliberately do NOT
    load the Netlify Identity widget script here: when Decap doesn't find
    window.netlifyIdentity, it falls back to its own built-in login form,
    talking directly to the identity_url / gateway_url set in config.yml.
    That avoids a race condition in the widget-based flow where Decap's
    2.5s init timeout can silently reset the API URL back to this site's
    own origin (which doesn't have an identity service, hence 404s).
  -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
